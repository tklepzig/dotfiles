<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Toolbox icon, maskable (purpose: maskable). Same mark as logo.svg but
       scaled to 0.62 of the canvas: Android crops past the web 80% safe-zone
       (only ~66% guaranteed; some launchers crop more). 0.70 cleared the crop;
       0.62 adds extra breathing room per Thomas. (Family rule: lyra
       pwa-maskable-padding — that one uses 0.70.) -->
  <rect width="100" height="100" fill="#15160e"/>
  <g transform="translate(50 50) scale(0.62) translate(-50 -50)">
    <path fill="#99cc66" fill-rule="evenodd"
      d="M95 50 L72.5 89 L27.5 89 L5 50 L27.5 11 L72.5 11 Z
         M27 50 a23 23 0 1 0 46 0 a23 23 0 1 0 -46 0 Z"/>
  </g>
</svg>
