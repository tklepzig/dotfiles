[battery-monitor]
help = '''
If battery level is lower than 16, plays an alert noise
Needs the alert file ~/.dotfiles-local/sounds/battery-alert.wav'''

[blitz-ortung]
help = "Opens blitzortung.org in browser"

[colours]
help = "List all possible console colours"
[[colours.args]]
name = "number of columns"
optional = true
default = 4

[docs]
help = "Opens toolbox docs in vim"

[docs-serve]
help = "Opens toolbox docs in browser"

[encrypt-clone]
help = '''
Clone a repository and run setup to support encryption

For the GPG key ID, you can obtain it by running:
  gpg --list-keys

Ensure the necessary filetypes are correctly configured in .gitattributes for your desired files:
  # encrypt markdown files
  *.md filter=encrypt'''
[[encrypt-clone.args]]
name = "URL to repository"
[[encrypt-clone.args]]
name = "GPG Key ID"

[ffmpeg-extract-frames]
help = '''
Extract frames from a video file.
Usage: ffmpeg-extract-frames <input> <output-dir> [--fps 1|source_fps] [--start HH:MM:SS] [--end HH:MM:SS] [--accurate]
--accurate: frame-accurate but slow seek (places -ss after -i); default is fast seek (before -i)'''
completion = ["--fps", "--start", "--end", "--accurate"]

[generate-password]
help = "Generate a strong random password — letters, digits & punctuation, ~6.44 bits/char (default 20 ≈ 129 bits). Need a URL-safe value? use generate-token."
[[generate-password.args]]
name = "length"
optional = true
default = 20

[generate-token]
help = "Generate a URL-safe random token — base64url charset, 6.0 bits/char (default 22 ≈ 132 bits). Safe in a URL path, no encoding. For a password use generate-password."
[[generate-token.args]]
name = "length"
optional = true
default = 22

[git-branch-diff]
help = "List branches and preview/view their diff against the default branch (main/master)"

[git-checkout-fuzzy]
help = "Use git checkout with fzf's fuzzy search"

[git-clone-cd]
help = "Clone a repository and cd into it"

[git-fetch-all]
help = "Fetches all repos in current directory"
[[git-fetch-all.args]]
name = "directory depth"
optional = true
default = 1

[git-fetch-merge]
help = '''
fetches and merges the current and the default branch (master or main)
If --all given, all branches are updated'''
[[git-fetch-merge.args]]
name = "--all"
optional = true

[git-github-compare]
help = '''
Opens github.com with compare view
If one ref is given, the current branch is compared to the given ref. If two refs are given, they are compared to each other.'''
[[git-github-compare.args]]
name = "Base Branch"
optional = true
[[git-github-compare.args]]
name = "Branch to compare"
optional = true

[git-github-pr]
help = '''
Opens github.com with current branch's PR
If \"new\" given, creates a new PR'''
[[git-github-pr.args]]
name = "new"
optional = true

[git-search]
help = "The git pickaxe, searches for a string in the whole history"
[[git-search.args]]
name = "search string"

[git-status-all]
help = "Outputs git status for every repo in current directory"
[[git-status-all.args]]
name = "directory depth"
optional = true
default = 1

[git-worktree-list]
help = '''
Manage git worktrees with fzf. Called via the `k` zsh function.
No args: fzf picker to switch into a worktree
add:    create a new worktree (defaults to ../<repo>-worktrees/<branch>)
        tracks remote branch if it exists on origin
        symlinks top-level git-ignored files (not directories)
        runs pnpm/npm install if a lock file is detected
        --no-cd: skip cd into the new worktree after creation (default: cd)
rm:      fzf multi-picker to remove one or more worktrees (with confirmation, auto-prunes after)
rm-self: remove the current worktree directly (no fzf, with confirmation, auto-prunes after)
tmux:    open all worktrees in a tmux session (named after the repo, one window per worktree)'''
completion = ["add", "rm", "rm-self", "tmux"]
[[git-worktree-list.args]]
name = "subcommand"
optional = true

[gpg-add-subkey]
help = "Add a new subkey to an existing GPG key"
[[gpg-add-subkey.args]]
name = "key id"

[gpg-create]
help = "Create a new GPG keypair"

[gpg-delete-primary-only]
help = "Delete only the primary key from a GPG key"
[[gpg-delete-primary-only.args]]
name = "key id"

[gpg-delete-subkey]
help = "Delete a subkey from a GPG keyring"
[[gpg-delete-subkey.args]]
name = "subkey id"

[gpg-export]
help = "Export a GPG key to a file"
[[gpg-export.args]]
name = "key id"

[gpg-import]
help = "Import a GPG key from a file"
[[gpg-import.args]]
name = "file name w/o extension (probably the key id)"

[gpg-list]
help = "List all GPG keys in the keyring"

[gpg-renew]
help = "Extend the expiration date of a GPG key"
[[gpg-renew.args]]
name = "fingerprint"
[[gpg-renew.args]]
name = "new expiry (possible units for value N: seconds=N, Nd, Nw, Nm, Ny)"

[inhibit]
help = "Stop linux from going to sleep or idle"
completion = ["suspend", "idle"]
[[inhibit.args]]
name = "what to inhibit"
optional = true
default = "suspend"

[list-ports]
help = "List all open ports"

[luks-close]
help = "Close LUKS container"
[[luks-close.args]]
name = "path/to/container"

[luks-open]
help = "Open LUKS container"
[[luks-open.args]]
name = "path/to/container"

[mastermind]
help = "Just a mastermind game"

[notify]
help = '''
Plays an notify sound, e.g. for getting notified after long running cmd
Needs the notify file ~/.dotfiles-local/sounds/notify.wav'''

[npm-tabula-rasa]
help = "Recursively remove node_modules"

[set-theme]
help = "Set the theme for kitty, tmux and vim"
completion = ["amun", "blue-green", "blue-orange", "borg", "borg-light", "jupiter-2", "kyoshi", "lcars", "lcars-light", "pw", "red"]
[[set-theme.args]]
name = "theme name"

[setup-asdf]
help = "Set up asdf and plugins"

[stacked]
help = "Using stacked branches in git, see `stacked help`"
completion = ["branch", "edit", "help", "init", "last", "list", "open", "parent", "pr", "sync", "update"]

[sync-with-drive]
help = "Sync current dotfiles with drive"
[[sync-with-drive.args]]
name = "path/to/drive"

[tmux-overview]
help = "Show all tmux sessions and windows with git branch, dirty status, and worktree indicator"

[tmux-snapshot]
help = '''
When run inside tmux, it will save a snapshot of all tmux sessions. If --close-all is given, all sessions will be closed. If -p is given, it will print the content from the snapshot for the current pane if existing.
When run outside tmux, it will restore the last saved snapshot.'''
completion = ["--close-all", "-p"]
[[tmux-snapshot.args]]
name = "--close-all"
optional = true
[[tmux-snapshot.args]]
name = "-p"
optional = true

[workspaces]
help = '''
Manage and open tmux sessions for active workspaces. Called via the `ws` alias.
Config: ~/.dotfiles-local/open-workspaces (INI-style: [session-name] sections with paths below)
Git repos get one window per worktree; plain dirs get a single window.
open:    (default) open tmux sessions for all configured workspaces
add [-s <session>] [<path>]:
         add current directory (or given path) to the config.
         -s/--session groups the path into a named session; omit to auto-name from the repo/dir.
rm:      fzf multi-picker to remove workspace(s) from the config
rm-self: remove the current directory from the config without fzf
list:    print all configured workspaces grouped by session
edit:    open the config file in $VISUAL / $EDITOR'''
completion = ["open", "add", "rm", "rm-self", "list", "edit"]
[[workspaces.args]]
name = "subcommand"
optional = true

[weather]
help = "Get the weather forecast"
[[weather.args]]
name = "location"
optional = true
