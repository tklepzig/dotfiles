# Emoji fallback for the tmux weather widget — needed on Linux where fontconfig
# may prefer symbol fonts over the color emoji font. macOS handles this automatically.
symbol_map U+2600-U+26FF Noto Color Emoji
symbol_map U+2744-U+2744 Noto Color Emoji
symbol_map U+1F300-U+1F5FF Noto Color Emoji
symbol_map U+1F600-U+1F64F Noto Color Emoji
symbol_map U+1F900-U+1F9FF Noto Color Emoji

# Media-control / transport glyphs — play ⏵ (U+23F5), pause ⏸ (U+23F8), ⏯ ⏭ ⏹ …
# (Miscellaneous Technical media block U+23E9–U+23FA). Pin to the monochrome
# symbol font: fontconfig occasionally routes these to a stray fallback (e.g. a
# .woff2 web font) after a fontconfig upgrade, which renders as tofu. Noto Color
# Emoji also lacks the plain triangles U+23F4/U+23F5 ("⏵⏵ auto mode"), so the
# whole block goes to Noto Sans Symbols 2 (pkg: noto-fonts) for a consistent
# monochrome look. If you'd rather keep the clock/hourglass U+23F0–U+23F3 as
# color emoji, split the range and leave those out.
symbol_map U+23E9-U+23FA Noto Sans Symbols 2
