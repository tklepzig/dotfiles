# Emoji fallback for the tmux weather widget — needed on Linux where fontconfig
# may prefer symbol fonts over the color emoji font. macOS handles this automatically.
symbol_map U+2600-U+26FF Noto Color Emoji
symbol_map U+2744-U+2744 Noto Color Emoji
symbol_map U+1F300-U+1F5FF Noto Color Emoji
symbol_map U+1F600-U+1F64F Noto Color Emoji
symbol_map U+1F900-U+1F9FF Noto Color Emoji
