font_family      JetBrains Mono Medium
bold_font        JetBrains Mono Bold
italic_font      JetBrains Mono Italic
bold_italic_font JetBrains Mono Bold Italic

# Emoji fallback for the tmux weather widget — needed on Linux where fontconfig
# may prefer symbol fonts over the color emoji font. macOS handles this automatically.
symbol_map U+2600-U+26FF Noto Color Emoji
symbol_map U+2744-U+2744 Noto Color Emoji
symbol_map U+1F300-U+1F5FF Noto Color Emoji
symbol_map U+1F600-U+1F64F Noto Color Emoji
symbol_map U+1F900-U+1F9FF Noto Color Emoji

font_size 16.0
adjust_column_width 94%

enable_audio_bell no
background_opacity 0.9
dynamic_background_opacity yes

kitty_mod ctrl+shift

map ctrl+0 change_font_size all 0
map ctrl+plus change_font_size all +2.0
map ctrl+minus change_font_size all -2.0

map kitty_mod+f toggle_fullscreen

map kitty_mod+1 set_background_opacity 1
map kitty_mod+plus set_background_opacity +0.05
map kitty_mod+minus set_background_opacity -0.05
map kitty_mod+0 set_background_opacity default

map kitty_mod+r load_config_file

macos_traditional_fullscreen yes
macos_quit_when_last_window_closed yes

mouse_hide_wait -3.0

# Do not check for updates
update_check_interval 0
