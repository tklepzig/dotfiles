pathOrName="#($HOME/.dotfiles/tmux/pathOrName.zsh '#{pane_current_path}' '#W' '#{windowMode}')"
sep="#[fg=$statusSeparatorFg]│#[default]"

# ── Left ──────────────────────────────────────────────────────────────────────

left="#{?#{==:#{s/root//:client_key_table},manage_mode},#[fg=$accentText#,bold] MANAGE $sep ,}"


# ── Window List ─────────────────────────────────────────────────────────────

winSep="#{?#{==:#I,1},,$sep}"
winActivityStyle="#{?window_bell_flag,#[fg=$primaryFg#,bg=$primaryBg#,bold],#{?window_activity_flag,#[fg=$primaryText#,bold],#[fg=$primaryText]}}"

isZoomed="#{window_zoomed_flag}"
isMultiPane="#{>:#{window_panes},1}"
winActiveTitle="#{?$isZoomed,[,}#I $pathOrName#{?$isZoomed,],}"
winInactiveTitle="#{?$isZoomed, [, }#I $pathOrName#{?$isZoomed,] , }"
paneIndicator="#{?#{&&:$isMultiPane,#{!=:$isZoomed,1}}, [#{pane_index}],}"

set -g window-status-separator ""
set -g window-status-current-format "$winSep#[fg=$accentFg,bg=$accentBg,bold] $winActiveTitle$paneIndicator #[default]"
set -g window-status-format "$winSep$winActivityStyle$winInactiveTitle#[default]"

windowList="#{W:#{E:window-status-format},#{E:window-status-current-format}}#[default]"

# ── Session list ──────────────────────────────────────────────────────────────

currentSession="#(tmux display-message -p '##S')"
isCurrentSession="#{==:#S,$currentSession}"

sessionListFull="#{S:#{?$isCurrentSession,#[fg=$accentFg#,bg=$accentBg#,bold] #S #[default],#[fg=$primaryText] #S }$sep}"
sessionListCurrentOnly="#{S:#{?$isCurrentSession,#[fg=$accentText#,bold] #S,#[fg=$primaryText] ■}#[default]} $sep"
sessionList="#{?#{==:#{sessionListMode},full},$sessionListFull,$sessionListCurrentOnly}"

sessionListLight="#{S:#{?$isCurrentSession,#[fg=$accentText#,bold],#[fg=$primaryText]} ■#[default]}"

# Running `echo $(tmux list-sessions | wc -l)` to trim the result, otherwise on osx it would be "       1" instead of "1"
moreThanOneSession="?#{==:1,#(echo $(tmux list-sessions | wc -l))}"

# ── Right ───────────────────────────────────────────────────────────────

dateTime="#[fg=$statusDateTimeFg] $date $time#[default]"
dateTimeLight="#[fg=$statusDateTimeFg] $time#[default]"

widgetSep="#[fg=$statusSeparatorFg] │#[default]"
rightFull="#{$moreThanOneSession,,$sessionList}$dateTime$widgetSep#($mediaInfo)#($ghInbox)$widgetSep#($freeSpace)$widgetSep#($wifiSignal)$widgetSep#($battery) "
rightLight="#{$moreThanOneSession,,$sessionListLight} $dateTimeLight #($battery) "

right="#[align=right]#{?#{==:#{statusMode},minimal},$rightLight,$rightFull}#[default]"

# ── Notch mode ───────────────────────────────────────────────────────────

widgetsOnly="$dateTime$widgetSep#($mediaInfo)#($ghInbox)$widgetSep#($freeSpace)$widgetSep#($wifiSignal)$widgetSep#($battery) "
widgetsOnlyLight="$dateTimeLight #($battery) "
notchLine0="#[align=right]#{?#{==:#{statusMode},minimal},$widgetsOnlyLight,$widgetsOnly}#[default]"

sessionListNotch="#{S:#{?$isCurrentSession,#[fg=$accentText#,bold] #S ,#[fg=$primaryText] ■ }#[default]}"
notchLine1="$left$windowList#[align=right]#{$moreThanOneSession,,$sessionListNotch}#[default]"

# ── Result ───────────────────────────────────────────────────────────────

set -g status-format[0] "#{?#{==:#{notchMode},notch},$notchLine0,$left$windowList$right}"
set -g status-format[1] "#{?#{==:#{notchMode},notch},$notchLine1,}"
